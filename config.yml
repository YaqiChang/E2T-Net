data_dir: /media/meta/File/datasets/Intention/JAAD_dataset/PN_ego
dataset: jaad
out_dir: /media/meta/Data/CYQ/TIP/E2T-Net/output

input: 5
output: 5
stride: 5
skip: 1

dtype: train
from_file: false
save: true
loader_workers: 4
loader_shuffle: true
pin_memory: true
prefetch_factor: 2

device: cuda
batch_size: 256
n_epochs: 30
lr: 1.0e-5
lr_scheduler: false
crossing_pos_weight: 4.0

hidden_size: 512
hardtanh_limit: 100
use_image: false
image_network: clstm
use_attribute: true
use_opticalflow: false

intent_pos_weight: 1.0
intention_loss_weight: 1.0
vae_loss_weight: 1.0e-5
auto_class_weights: false
max_class_weight: 1.0
use_balanced_sampler: true
sampler_target_pos_rate: 0.3
threshold_metric: f0.5
abort_on_collapse: true
collapse_patience_epochs: 10
collapse_min_state_f1: 0.05
collapse_min_intent_f1: 0.05
collapse_max_state_recall: 0.01
collapse_max_intent_recall: 0.01
best_metric_f1_weight: 2.0
best_metric_recall_weight: 1.0
best_metric_precision_weight: 0.25
best_metric_bal_acc_weight: 0.5
best_metric_ade_weight: 0.01
weight_decay: 1.0e-4
grad_clip_norm: 5.0
label_smoothing: 0.0
use_plateau_scheduler: true
plateau_factor: 0.5
plateau_patience: 4
plateau_min_lr: 1.0e-6
use_early_stopping: true
early_stopping_patience: 5
early_stopping_min_delta: 1.0e-4

use_pose: false
use_decision_accumulator: false
belief_dim: 0
belief_readout: last
crossing_loss_type: ce
focal_gamma: 2.0
focal_alpha: -1.0
use_fused_decoder_input: false
pose_file: ""
pose_format: jaad_hrnet_npz
